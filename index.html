<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Nastaliq+Urdu:wght@400..700&family=Pixelify+Sans:wght@400..700&family=Tiro+Devanagari+Hindi:ital@0;1&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="body">
        <div class="display">WELCOME!</div>
        <div class="numbers">
            <button class="button flower">🌼</button>
            <button class="button clear c">C</button>
            <button class="button clearall ac">AC</button>
            <button class="button on">ON</button>
            <button class="button number">1</button>
            <button class="button number">2</button>
            <button class="button number">3</button>
            <button class="button operator add">+</button>
            <button class="button number">4</button>
            <button class="button number">5</button>
            <button class="button number">6</button>
            <button class="button operator sub">-</button>
            <button class="button number">7</button>
            <button class="button number">8</button>
            <button class="button number">9</button>
            <button class="button operator div">/</button>
            <button class="button decimal">.</button>
            <button class="button number">0</button>
            <button class="button eq">=</button>
            <button class="button operator mul">*</button>
                
        </div>

    </div>
    
</body>
</html>
